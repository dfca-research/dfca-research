<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFCA Research | Evidence for Development in Pakistan</title>
  <meta name="description" content="DFCA Research — established 2018 — produces rigorous, policy-relevant evidence on development, health, governance, and resilience across KPK, FATA, and Punjab, Pakistan. Partners include Stanford, UCLA, EUI, Boston University, LUMS, and CDPR." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
</head>
<body>

  <!--
    ─────────────────────────────────────────────────────────────────
    SCROLL POSITION DOT-NAV  (global UI element — stays in master)
    ─────────────────────────────────────────────────────────────────
  -->
  <nav class="dot-nav" aria-label="Page sections">
    <a href="#hero"     class="dot active" data-label="Home"></a>
    <a href="#about"    class="dot" data-label="About"></a>
    <a href="#research" class="dot" data-label="Research"></a>
    <a href="#featured" class="dot" data-label="Featured"></a>
    <a href="#approach" class="dot" data-label="Methodology"></a>
    <a href="#contact"  class="dot" data-label="Contact"></a>
  </nav>

  <!--
    ─────────────────────────────────────────────────────────────────
    SECTION MOUNT POINTS
    Each div is replaced with the matching file in sections/
    via the fetch-based loader in scripts.js.
    To edit any section, open its corresponding file below:
    ─────────────────────────────────────────────────────────────────
    sections/topbar.html    — top utility bar
    sections/nav.html       — sticky navigation
    sections/hero.html      — hero + KPK map
    sections/stats.html     — key statistics band
    sections/about.html     — organisation background & partners
    sections/research.html  — six research domains
    sections/featured.html  — featured spotlight study
    sections/approach.html  — methodology & SDG alignment
    sections/contact.html   — contact details & enquiry form
    sections/footer.html    — footer
    ─────────────────────────────────────────────────────────────────
  -->
  <div id="mount-topbar"></div>
  <div id="mount-nav"></div>
  <div id="mount-hero"></div>
  <div id="mount-stats"></div>
  <div id="mount-about"></div>
  <div id="mount-research"></div>
  <div id="mount-featured"></div>
  <div id="mount-approach"></div>
  <div id="mount-contact"></div>
  <div id="mount-footer"></div>

  <!-- Scripts (loads sections, then initialises all interactions) -->
  <script src="scripts.js"></script>

</body>
</html>
